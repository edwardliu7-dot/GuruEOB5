openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for GuruEOB5 - school management app for teachers
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: teachers
    description: Teacher accounts
  - name: students
    description: Student records
  - name: subjects
    description: Subjects taught
  - name: journal
    description: Teaching journal entries
  - name: attendance
    description: Student attendance
  - name: grades
    description: Student grades
  - name: points
    description: Student points/behavior
  - name: documents
    description: Administrative documents
  - name: dashboard
    description: Dashboard aggregates
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new teacher account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the current logged-in teacher
      responses:
        "200":
          description: Current teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /kepsek/overview:
    get:
      operationId: getKepsekOverview
      tags: [dashboard]
      summary: Kepala sekolah progress overview across all teachers
      responses:
        "200":
          description: Overview of teacher work progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KepsekOverview"

  /kurikulum/overview:
    get:
      operationId: getKurikulumOverview
      tags: [dashboard]
      summary: Wakasek kurikulum view of all teachers' administrative documents
      responses:
        "200":
          description: Documents per teacher and subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KurikulumOverview"

  /kesiswaan/overview:
    get:
      operationId: getKesiswaanOverview
      tags: [dashboard]
      summary: Wakasek kesiswaan recap of attendance and points per class
      responses:
        "200":
          description: Attendance and points recap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KesiswaanOverview"

  /walikelas/rekap:
    get:
      operationId: getWaliKelasRekap
      tags: [dashboard]
      summary: Wali kelas recap for the current teacher's homeroom class
      responses:
        "200":
          description: Homeroom class recap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaliKelasRekap"

  /teachers:
    get:
      operationId: listTeachers
      tags: [teachers]
      summary: List all teachers
      responses:
        "200":
          description: List of teachers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Teacher"
  /teachers/{id}:
    get:
      operationId: getTeacher
      tags: [teachers]
      summary: Get a teacher by id
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
    patch:
      operationId: updateTeacher
      tags: [teachers]
      summary: Update a teacher
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeacherInput"
      responses:
        "200":
          description: Updated teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
    delete:
      operationId: deleteTeacher
      tags: [teachers]
      summary: Delete a teacher
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List students
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "200":
          description: Created student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
  /students/import/analyze:
    post:
      operationId: analyzeStudentImport
      tags: [students]
      summary: Analyze raw spreadsheet rows with AI and map them to student fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentImportAnalyzeInput"
      responses:
        "200":
          description: AI-mapped student rows for verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentImportAnalyzeResult"
  /students/bulk:
    post:
      operationId: bulkCreateStudents
      tags: [students]
      summary: Create many students at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateStudentsInput"
      responses:
        "200":
          description: Number of students created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCreateStudentsResult"
  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get a student by id
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update a student
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "200":
          description: Updated student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete a student
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /subjects:
    get:
      operationId: listSubjects
      tags: [subjects]
      summary: List subjects
      responses:
        "200":
          description: List of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"
    post:
      operationId: createSubject
      tags: [subjects]
      summary: Create a subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectInput"
      responses:
        "200":
          description: Created subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
  /subjects/{id}:
    patch:
      operationId: updateSubject
      tags: [subjects]
      summary: Update a subject
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectInput"
      responses:
        "200":
          description: Updated subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
    delete:
      operationId: deleteSubject
      tags: [subjects]
      summary: Delete a subject
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List administrative documents
      parameters:
        - name: subjectId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminDocument"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create an administrative document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminDocumentInput"
      responses:
        "200":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDocument"
  /documents/{id}:
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /journal:
    get:
      operationId: listJournalEntries
      tags: [journal]
      summary: List teaching journal entries
      parameters:
        - name: subjectId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"
    post:
      operationId: createJournalEntry
      tags: [journal]
      summary: Create a teaching journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryInput"
      responses:
        "200":
          description: Created journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
  /journal/{id}:
    delete:
      operationId: deleteJournalEntry
      tags: [journal]
      summary: Delete a journal entry
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: subjectId
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"
    post:
      operationId: createAttendanceRecord
      tags: [attendance]
      summary: Create/record attendance for a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceRecordInput"
      responses:
        "200":
          description: Created attendance record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/bulk:
    post:
      operationId: bulkCreateAttendance
      tags: [attendance]
      summary: Record the same attendance status for a group of students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateAttendanceInput"
      responses:
        "200":
          description: Bulk create result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCreateResult"

  /grades:
    get:
      operationId: listGrades
      tags: [grades]
      summary: List grades
      parameters:
        - name: subjectId
          in: query
          schema:
            type: string
        - name: studentId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of grades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grade"
    post:
      operationId: createGrade
      tags: [grades]
      summary: Record a grade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeInput"
      responses:
        "200":
          description: Created grade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grade"

  /grades/bulk:
    post:
      operationId: bulkCreateGrades
      tags: [grades]
      summary: Record the same grade for a group of students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateGradesInput"
      responses:
        "200":
          description: Bulk create result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCreateResult"

  /points:
    get:
      operationId: listPoints
      tags: [points]
      summary: List student points
      parameters:
        - name: studentId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of point records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PointRecord"
    post:
      operationId: createPoint
      tags: [points]
      summary: Record a point entry for a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PointRecordInput"
      responses:
        "200":
          description: Created point record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointRecord"

  /points/bulk:
    post:
      operationId: bulkCreatePoints
      tags: [points]
      summary: Record the same point entry for a group of students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreatePointsInput"
      responses:
        "200":
          description: Bulk create result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCreatePointsResult"

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    Teacher:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        name:
          type: string
        jabatan:
          type: array
          items:
            type: string
            enum: [kepala_sekolah, wakasek, guru, wali_kelas]
        mapel:
          type: array
          items:
            type: string
          nullable: true
        wakasekBidang:
          type: string
          nullable: true
        waliKelasKelas:
          type: string
          nullable: true
        kelasDiampu:
          type: array
          items:
            type: string
        school:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        isAdmin:
          type: boolean
      required: [id, username, name, jabatan, kelasDiampu, createdAt, isAdmin]

    RegisterInput:
      type: object
      properties:
        name:
          type: string
        jabatan:
          type: array
          items:
            type: string
            enum: [kepala_sekolah, wakasek, guru, wali_kelas]
          minItems: 1
        mapel:
          type: array
          items:
            type: string
        wakasekBidang:
          type: string
          enum: [Kurikulum, Kesiswaan]
        waliKelasKelas:
          type: string
        kelasDiampu:
          type: array
          items:
            type: string
        school:
          type: string
        username:
          type: string
        password:
          type: string
      required: [name, jabatan, kelasDiampu, school, username, password]

    LoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    UpdateTeacherInput:
      type: object
      properties:
        name:
          type: string
        jabatan:
          type: array
          items:
            type: string
            enum: [kepala_sekolah, wakasek, guru, wali_kelas]
        mapel:
          type: array
          items:
            type: string
        wakasekBidang:
          type: string
        waliKelasKelas:
          type: string
        kelasDiampu:
          type: array
          items:
            type: string
        school:
          type: string
        bio:
          type: string
          maxLength: 500
        photoUrl:
          type: string
          maxLength: 400000
          pattern: "^$|^data:image/(jpeg|png|webp);base64,|^https?://"

    Student:
      type: object
      properties:
        id:
          type: string
        nisn:
          type: string
          nullable: true
        namaLengkap:
          type: string
        kelas:
          type: string
        jenisKelamin:
          type: string
          enum: [L, P]
        school:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, nisn, namaLengkap, kelas, jenisKelamin, school, createdAt]

    StudentInput:
      type: object
      properties:
        nisn:
          type: string
          nullable: true
        namaLengkap:
          type: string
        kelas:
          type: string
        jenisKelamin:
          type: string
          enum: [L, P]
        school:
          type: string
      required: [namaLengkap, kelas, jenisKelamin, school]

    StudentImportAnalyzeInput:
      type: object
      properties:
        rows:
          type: array
          maxItems: 1000
          items:
            type: array
            items:
              type: string
      required: [rows]

    StudentImportAnalyzeResult:
      type: object
      properties:
        students:
          type: array
          items:
            $ref: "#/components/schemas/StudentInput"
      required: [students]

    BulkCreateStudentsInput:
      type: object
      properties:
        students:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: "#/components/schemas/StudentInput"
      required: [students]

    BulkCreatePointsInput:
      type: object
      properties:
        studentIds:
          type: array
          minItems: 1
          maxItems: 500
          items:
            type: string
        jenis:
          type: string
          enum: [positif, negatif]
        poin:
          type: number
        keterangan:
          type: string
        tanggal:
          type: string
      required: [studentIds, jenis, poin, keterangan, tanggal]

    BulkCreatePointsResult:
      type: object
      properties:
        count:
          type: integer
      required: [count]

    BulkCreateResult:
      type: object
      properties:
        count:
          type: integer
      required: [count]

    BulkCreateAttendanceInput:
      type: object
      properties:
        studentIds:
          type: array
          minItems: 1
          maxItems: 500
          items:
            type: string
        subjectId:
          type: string
        tanggal:
          type: string
        status:
          type: string
          enum: [hadir, izin, sakit, alpa]
      required: [studentIds, subjectId, tanggal, status]

    BulkCreateGradesInput:
      type: object
      properties:
        studentIds:
          type: array
          minItems: 1
          maxItems: 500
          items:
            type: string
        subjectId:
          type: string
        jenis:
          type: string
          enum: [tugas, uts, uas]
        nilai:
          type: number
        tanggal:
          type: string
      required: [studentIds, subjectId, jenis, nilai, tanggal]

    BulkCreateStudentsResult:
      type: object
      properties:
        count:
          type: integer
        skipped:
          type: integer
      required: [count, skipped]

    Subject:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        teacherId:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, teacherId, createdAt]

    SubjectInput:
      type: object
      properties:
        name:
          type: string
        teacherId:
          type: string
      required: [name, teacherId]

    AdminDocument:
      type: object
      properties:
        id:
          type: string
        subjectId:
          type: string
        name:
          type: string
        description:
          type: string
        uploadedAt:
          type: string
          format: date-time
      required: [id, subjectId, name, uploadedAt]

    AdminDocumentInput:
      type: object
      properties:
        subjectId:
          type: string
        name:
          type: string
        description:
          type: string
      required: [subjectId, name]

    JournalEntry:
      type: object
      properties:
        id:
          type: string
        subjectId:
          type: string
        teacherId:
          type: string
        tanggal:
          type: string
        kelas:
          type: string
        materi:
          type: string
        catatan:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, subjectId, teacherId, tanggal, kelas, materi, createdAt]

    JournalEntryInput:
      type: object
      properties:
        subjectId:
          type: string
        tanggal:
          type: string
        kelas:
          type: string
        materi:
          type: string
        catatan:
          type: string
      required: [subjectId, tanggal, kelas, materi]

    AttendanceRecord:
      type: object
      properties:
        id:
          type: string
        studentId:
          type: string
        subjectId:
          type: string
        tanggal:
          type: string
        status:
          type: string
          enum: [hadir, izin, sakit, alpa]
        createdAt:
          type: string
          format: date-time
      required: [id, studentId, subjectId, tanggal, status, createdAt]

    AttendanceRecordInput:
      type: object
      properties:
        studentId:
          type: string
        subjectId:
          type: string
        tanggal:
          type: string
        status:
          type: string
          enum: [hadir, izin, sakit, alpa]
      required: [studentId, subjectId, tanggal, status]

    Grade:
      type: object
      properties:
        id:
          type: string
        studentId:
          type: string
        subjectId:
          type: string
        jenis:
          type: string
          enum: [tugas, uts, uas]
        nilai:
          type: number
        tanggal:
          type: string
        createdAt:
          type: string
          format: date-time
