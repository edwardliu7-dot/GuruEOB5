openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for GuruEOB5 - school management app for teachers
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: teachers
    description: Teacher accounts
  - name: students
    description: Student records
  - name: subjects
    description: Subjects taught
  - name: journal
    description: Teaching journal entries
  - name: attendance
    description: Student attendance
  - name: grades
    description: Student grades
  - name: points
    description: Student points/behavior
  - name: documents
    description: Administrative documents
  - name: dashboard
    description: Dashboard aggregates
  - name: academic-calendar
    description: Academic calendar and weeks (admin-managed)
  - name: prosem
    description: Program semester (per-teacher lesson plan)
  - name: info-pekanan
    description: Weekly info (rencana vs realisasi)
  - name: modul-ajar
    description: AI-generated Kurikulum Merdeka teaching modules
  - name: soal-otomatis
    description: AI-generated practice questions/quizzes
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new teacher account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the current logged-in teacher
      responses:
        "200":
          description: Current teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /kepsek/overview:
    get:
      operationId: getKepsekOverview
      tags: [dashboard]
      summary: Kepala sekolah progress overview across all teachers
      responses:
        "200":
          description: Overview of teacher work progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KepsekOverview"

  /kurikulum/overview:
    get:
      operationId: getKurikulumOverview
      tags: [dashboard]
      summary: Wakasek kurikulum view of all teachers' administrative documents
      responses:
        "200":
          description: Documents per teacher and subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KurikulumOverview"

  /kesiswaan/overview:
    get:
      operationId: getKesiswaanOverview
      tags: [dashboard]
      summary: Wakasek kesiswaan recap of attendance and points per class
      responses:
        "200":
          description: Attendance and points recap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KesiswaanOverview"

  /walikelas/rekap:
    get:
      operationId: getWaliKelasRekap
      tags: [dashboard]
      summary: Wali kelas recap for the current teacher's homeroom class
      responses:
        "200":
          description: Homeroom class recap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaliKelasRekap"

  /walikelas/akun-siswa:
    get:
      operationId: listStudentAccounts
      tags: [dashboard]
      summary: List every student in the current wali kelas's class with their account status
      responses:
        "200":
          description: List of students with account status
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    studentId:
                      type: string
                    namaLengkap:
                      type: string
                    hasAccount:
                      type: boolean
                    username:
                      type: string
                      nullable: true
                    password:
                      type: string
                      nullable: true
                  required: [studentId, namaLengkap, hasAccount, username, password]

  /walikelas/akun-siswa/{id}/generate:
    post:
      operationId: generateStudentAccount
      tags: [dashboard]
      summary: Generate (or fetch existing) a TOMAT/BLP account for a student in the current wali kelas's class
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateStudentAccountInput"
      responses:
        "201":
          description: Generated account credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentAccount"

  /walikelas/akun-siswa/generate-all:
    post:
      operationId: generateAllStudentAccounts
      tags: [dashboard]
      summary: Generate accounts for every student in the current wali kelas's class who doesn't have one yet
      responses:
        "200":
          description: Bulk generation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  generated:
                    type: integer
                  alreadyExisted:
                    type: integer
                  accounts:
                    type: array
                    items:
                      $ref: "#/components/schemas/StudentAccount"
                required: [generated, alreadyExisted, accounts]

  /walikelas/akun-siswa/cards:
    get:
      operationId: downloadAllStudentAccountCards
      tags: [dashboard]
      summary: Download a single PDF containing a printable account card for every generated account in the class
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /walikelas/akun-siswa/{id}:
    get:
      operationId: getStudentAccount
      tags: [dashboard]
      summary: Get an already-generated account's credentials for a student
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Account credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentAccount"

  /walikelas/akun-siswa/{id}/card:
    get:
      operationId: downloadStudentAccountCard
      tags: [dashboard]
      summary: Download a single printable account card as PDF
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /teachers:
    get:
      operationId: listTeachers
      tags: [teachers]
      summary: List all teachers
      responses:
        "200":
          description: List of teachers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Teacher"
  /teachers/{id}:
    get:
      operationId: getTeacher
      tags: [teachers]
      summary: Get a teacher by id
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
    patch:
      operationId: updateTeacher
      tags: [teachers]
      summary: Update a teacher
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeacherInput"
      responses:
        "200":
          description: Updated teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
    delete:
      operationId: deleteTeacher
      tags: [teachers]
      summary: Delete a teacher
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List students
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "200":
          description: Created student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
  /students/import/analyze:
    post:
      operationId: analyzeStudentImport
      tags: [students]
      summary: Analyze raw spreadsheet rows with AI and map them to student fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentImportAnalyzeInput"
      responses:
        "200":
          description: AI-mapped student rows for verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentImportAnalyzeResult"
  /students/bulk:
    post:
      operationId: bulkCreateStudents
      tags: [students]
      summary: Create many students at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateStudentsInput"
      responses:
        "200":
          description: Number of students created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCreateStudentsResult"
  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get a student by id
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update a student
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "200":
          description: Updated student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete a student
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /subjects:
    get:
      operationId: listSubjects
      tags: [subjects]
      summary: List subjects
      responses:
        "200":
          description: List of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"
    post:
      operationId: createSubject
      tags: [subjects]
      summary: Create a subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectInput"
      responses:
        "200":
          description: Created subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
  /subjects/{id}:
    patch:
      operationId: updateSubject
      tags: [subjects]
      summary: Update a subject
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectInput"
      responses:
        "200":
          description: Updated subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
    delete:
      operationId: deleteSubject
      tags: [subjects]
      summary: Delete a subject
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List administrative documents
      parameters:
        - name: subjectId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminDocument"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create an administrative document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminDocumentInput"
      responses:
        "200":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDocument"
  /documents/{id}:
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /journal:
    get:
      operationId: listJournalEntries
      tags: [journal]
      summary: List teaching journal entries
      parameters:
        - name: subjectId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"
    post:
      operationId: createJournalEntry
      tags: [journal]
      summary: Create a teaching journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryInput"
      responses:
        "200":
          description: Created journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
  /journal/{id}:
    patch:
      operationId: updateJournalEntry
      tags: [journal]
      summary: Update a journal entry
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryInput"
      responses:
        "200":
          description: Updated journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
    delete:
      operationId: deleteJournalEntry
      tags: [journal]
      summary: Delete a journal entry
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: subjectId
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
        - name: kelas
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"
    post:
      operationId: createAttendanceRecord
      tags: [attendance]
      summary: Create/record attendance for a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceRecordInput"
      responses:
        "200":
          description: Created attendance record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/{id}:
    patch:
      operationId: updateAttendanceRecord
      tags: [attendance]
      summary: Update an attendance record's status
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceUpdate"
      responses:
        "200":
          description: Updated attendance record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"
    delete:
      operationId: deleteAttendanceRecord
      tags: [attendance]
      summary: Delete an attendance record
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /attendance/bulk:
    post:
      operationId: bulkCreateAttendance
      tags: [attendance]
      summary: Record the same attendance status for a group of students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateAttendanceInput"
      responses:
        "200":
          description: Bulk create result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCreateResult"

  /grades:
    get:
      operationId: listGrades
      tags: [grades]
      summary: List grades
      parameters:
        - name: subjectId
          in: query
          schema:
            type: string
        - name: studentId
          in: query
          schema:
            type: string
        - name: calendarId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of grades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grade"
    post:
      operationId: createGrade
      tags: [grades]
      summary: Record or update a grade (upsert by student/subject/calendar/jenis/lingkup materi/tp)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeInput"
      responses:
        "200":
          description: Created or updated grade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grade"

  /grades/{id}:
    patch:
      operationId: updateGrade
      tags: [grades]
      summary: Update a grade's score
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeUpdate"
      responses:
        "200":
          description: Updated grade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grade"
    delete:
      operationId: deleteGrade
      tags: [grades]
      summary: Delete a grade
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /points:
    get:
      operationId: listPoints
      tags: [points]
      summary: List student points
      parameters:
        - name: studentId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of point records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PointRecord"
    post:
      operationId: createPoint
      tags: [points]
      summary: Record a point entry for a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PointRecordInput"
      responses:
        "200":
          description: Created point record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointRecord"

  /points/{id}:
    patch:
      operationId: updatePoint
      tags: [points]
      summary: Update a point record
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PointUpdate"
      responses:
        "200":
          description: Updated point record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointRecord"
    delete:
      operationId: deletePoint
      tags: [points]
      summary: Delete a point record
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /points/bulk:
    post:
      operationId: bulkCreatePoints
      tags: [points]
      summary: Record the same point entry for a group of students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreatePointsInput"
      responses:
        "200":
          description: Bulk create result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCreatePointsResult"

  /academic-calendars:
    get:
      operationId: listAcademicCalendars
      tags: [academic-calendar]
      summary: List academic calendars for the current school
      responses:
        "200":
          description: List of academic calendars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AcademicCalendar"
    post:
      operationId: createAcademicCalendar
      tags: [academic-calendar]
      summary: Create an academic calendar (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcademicCalendarInput"
      responses:
        "200":
          description: Created academic calendar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicCalendar"
  /academic-calendars/{id}:
    delete:
      operationId: deleteAcademicCalendar
      tags: [academic-calendar]
      summary: Delete an academic calendar (admin only)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /academic-weeks:
    get:
      operationId: listAcademicWeeks
      tags: [academic-calendar]
      summary: List weeks of a calendar
      parameters:
        - name: calendarId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of academic weeks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AcademicWeek"
    post:
      operationId: createAcademicWeek
      tags: [academic-calendar]
      summary: Create an academic week (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcademicWeekInput"
      responses:
        "200":
          description: Created academic week
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicWeek"
  /academic-weeks/{id}:
    put:
      operationId: updateAcademicWeek
      tags: [academic-calendar]
      summary: Update an academic week (admin only)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcademicWeekInput"
      responses:
        "200":
          description: Updated academic week
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicWeek"
    delete:
      operationId: deleteAcademicWeek
      tags: [academic-calendar]
      summary: Delete an academic week (admin only)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /prosem:
    get:
      operationId: listProsem
      tags: [prosem]
      summary: List the current teacher's prosem entries
      parameters:
