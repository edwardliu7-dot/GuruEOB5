components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    Teacher:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        name:
          type: string
        jabatan:
          type: array
          items:
            type: string
            enum: [kepala_sekolah, wakasek, guru, wali_kelas]
        mapel:
          type: array
          items:
            type: string
          nullable: true
        wakasekBidang:
          type: string
          nullable: true
        waliKelasKelas:
          type: string
          nullable: true
        kelasDiampu:
          type: array
          items:
            type: string
        school:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        isAdmin:
          type: boolean
      required: [id, username, name, jabatan, kelasDiampu, createdAt, isAdmin]

    RegisterInput:
      type: object
      properties:
        name:
          type: string
        jabatan:
          type: array
          items:
            type: string
            enum: [kepala_sekolah, wakasek, guru, wali_kelas]
          minItems: 1
        mapel:
          type: array
          items:
            type: string
        wakasekBidang:
          type: string
          enum: [Kurikulum, Kesiswaan]
        waliKelasKelas:
          type: string
        kelasDiampu:
          type: array
          items:
            type: string
        school:
          type: string
        username:
          type: string
        password:
          type: string
      required: [name, jabatan, kelasDiampu, school, username, password]

    LoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    UpdateTeacherInput:
      type: object
      properties:
        name:
          type: string
        jabatan:
          type: array
          items:
            type: string
            enum: [kepala_sekolah, wakasek, guru, wali_kelas]
        mapel:
          type: array
          items:
            type: string
        wakasekBidang:
          type: string
        waliKelasKelas:
          type: string
        kelasDiampu:
          type: array
          items:
            type: string
        school:
          type: string
        bio:
          type: string
          maxLength: 500
        photoUrl:
          type: string
          maxLength: 400000
          pattern: "^$|^data:image/(jpeg|png|webp);base64,|^https?://"

    GenerateStudentAccountInput:
      type: object
      properties:
        regenerate:
          type: boolean

    StudentAccount:
      type: object
      properties:
        studentId:
          type: string
        username:
          type: string
        password:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [studentId, username, password, createdAt]

    Student:
      type: object
      properties:
        id:
          type: string
        nisn:
          type: string
          nullable: true
        namaLengkap:
          type: string
        kelas:
          type: string
        jenisKelamin:
          type: string
          enum: [L, P]
        school:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, nisn, namaLengkap, kelas, jenisKelamin, school, createdAt]

    StudentInput:
      type: object
      properties:
        nisn:
          type: string
          nullable: true
        namaLengkap:
          type: string
        kelas:
          type: string
        jenisKelamin:
          type: string
          enum: [L, P]
        school:
          type: string
      required: [namaLengkap, kelas, jenisKelamin, school]

    StudentImportAnalyzeInput:
      type: object
      properties:
        rows:
          type: array
          maxItems: 1000
          items:
            type: array
            items:
              type: string
      required: [rows]

    StudentImportAnalyzeResult:
      type: object
      properties:
        students:
          type: array
          items:
            $ref: "#/components/schemas/StudentInput"
      required: [students]

    BulkCreateStudentsInput:
      type: object
      properties:
        students:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: "#/components/schemas/StudentInput"
      required: [students]

